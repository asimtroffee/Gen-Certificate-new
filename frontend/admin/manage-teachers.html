<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Event Teachers - CertiGen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<!-- Quill.js CDN -->
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --brand:#6D28D9;--brand-light:#EDE9FE;
    --blue:#2563EB;--blue-light:#EFF6FF;
    --red:#EF4444;--red-light:#FEF2F2;
    --green:#22C55E;--green-light:#F0FDF4;
    --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;
    --gray-400:#9CA3AF;--gray-500:#6B7280;
    --gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;--gray-900:#111827;
    --radius:8px;--radius-lg:12px;
    --shadow-sm:0 1px 3px rgba(0,0,0,.08);
    --shadow:0 4px 12px rgba(0,0,0,.1);
  }
  body{font-family:'Inter',sans-serif;background:#FAFAFB;color:var(--gray-900);padding:32px;}
  a{text-decoration:none;color:var(--gray-600);transition:color .15s;}
  a:hover{color:var(--gray-900);}
  
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;}
  .page-title{font-size:22px;font-weight:700;color:var(--gray-900);line-height:1.2;display:flex;align-items:center;gap:12px;}
  .page-sub{font-size:13px;color:var(--gray-500);margin-top:3px;margin-left:38px;}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:#1d4ed8;}
  .btn-outline{background:#fff;color:var(--gray-700);border:1px solid var(--gray-200);}
  .btn-outline:hover{background:var(--gray-50);}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn .material-symbols-outlined{font-size:16px;}
  
  .card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;}
  .card-header{padding:16px 20px;border-bottom:1px solid var(--gray-200);background:var(--gray-50);display:flex;justify-content:space-between;align-items:center;}
  .card-title{font-size:14px;font-weight:600;color:var(--gray-700);}
  
  /* KPI Analytics Section */
  .analytics-section { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 16px; flex: 1; min-width: 300px; }
  .kpi-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s; }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--brand); }
  .kpi-card.active { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-light); }
  .kpi-label { font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; margin-bottom: 8px; }
  .kpi-value { font-size: 24px; font-weight: 700; color: var(--gray-900); }
  .text-green { color: #15803d; }
  .text-red { color: #DC2626; }
  .text-gray { color: var(--gray-600); }
  .text-brand { color: var(--brand); }
  .chart-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); width: 220px; display: flex; align-items: center; justify-content: center; position: relative; }
  .chart-inner-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 11px; font-weight: 600; color: var(--gray-500); text-align: center; pointer-events: none; }
  .chart-inner-label span { display: block; font-size: 16px; font-weight: 700; color: var(--gray-900); }
  @media (max-width: 768px) {
    .chart-card { width: 100%; height: 220px; }
  }

  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{padding:10px 16px;text-align:left;font-weight:600;color:var(--gray-500);font-size:11px;text-transform:uppercase;letter-spacing:.4px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);}
  tbody tr{border-bottom:1px solid var(--gray-100);transition:background .1s;}
  tbody tr:hover{background:var(--gray-50);}
  tbody td{padding:12px 16px;color:var(--gray-700);}
  tbody tr:last-child{border-bottom:none;}
  
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600;}
  .badge-green{background:var(--green-light);color:#15803d;}
  .badge-gray{background:var(--gray-100);color:var(--gray-600);}

  .form-group{margin-bottom:16px;}
  .form-label{display:block;font-size:12px;font-weight:600;color:var(--gray-600);text-transform:uppercase;margin-bottom:6px;}
  .form-input{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:14px;font-family:'Inter',sans-serif;outline:none;}
  
  #toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
  .toast{display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow);animation:toastIn .25s ease;pointer-events:all;max-width:340px;}
  .toast-success{background:#fff;border-left:4px solid var(--green);color:var(--gray-800);}
  .toast-error{background:#fff;border-left:4px solid var(--red);color:var(--gray-800);}
  .toast .material-symbols-outlined{font-size:18px;}
  @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div style="max-width:960px;margin:0 auto;">
  <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;">
      <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span>Back to Dashboard
    </a>
    <button class="btn btn-outline btn-sm" style="color:var(--red);border-color:var(--red-light);" onclick="logoutAdmin()">
      <span class="material-symbols-outlined" style="font-size:16px;">logout</span>Logout
    </button>
  </div>

  <div class="page-header">
    <div>
      <h1 class="page-title">Manage Teachers</h1>
      <p class="page-sub" id="event-subtitle">Loading event...</p>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" onclick="exportCSV()" id="btn-export-csv">
        <span class="material-symbols-outlined">download</span>Export CSV
      </button>
      <label class="btn btn-outline" style="cursor:pointer">
        <span class="material-symbols-outlined">upload_file</span>Upload Excel
        <input type="file" id="excel-upload" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleExcelUpload(event)">
      </label>
      <button class="btn btn-primary" onclick="handleResendAll()" id="btn-email-pending" disabled>
        <span class="material-symbols-outlined">mail</span>Email Pending
      </button>
    </div>
  </div>

  <div id="alert-anchor"></div>

  <!-- Analytics KPI Header -->
  <div class="analytics-section" id="analytics-section" style="display: none;">
    <div class="kpi-grid">
      <div class="kpi-card active" onclick="filterTable('all', this)">
        <div class="kpi-label">Total Teachers</div>
        <div class="kpi-value" id="kpi-total">0</div>
      </div>
      <div class="kpi-card" onclick="filterTable('pending', this)">
        <div class="kpi-label">Pending</div>
        <div class="kpi-value text-gray" id="kpi-pending">0</div>
      </div>
      <div class="kpi-card" onclick="filterTable('completed', this)">
        <div class="kpi-label">Completed</div>
        <div class="kpi-value text-green" id="kpi-completed">0/0</div>
      </div>
      <div class="kpi-card" onclick="filterTable('bounced', this)">
        <div class="kpi-label">Bounced Emails</div>
        <div class="kpi-value text-red" id="kpi-bounced">0</div>
      </div>
      <div class="kpi-card" onclick="filterTable('all', this)">
        <div class="kpi-label">Conversion</div>
        <div class="kpi-value text-brand" id="kpi-conversion">0%</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-inner-label"><span id="chart-total">0</span>Total</div>
      <canvas id="kpiChart"></canvas>
    </div>
  </div>

  <div class="card" style="margin-bottom:24px;padding:20px;">
    <div class="form-group" style="margin-bottom:12px;">
      <label class="form-label">Email Template Style</label>
      <select id="email-choice" class="form-input" onchange="toggleEmailChoice()">
        <option value="default">Default System Template (3-step guide)</option>
        <option value="custom">Custom Message Only</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:0; display:none;" id="custom-msg-group">
      <div class="form-group" style="margin-bottom:12px;">
        <label class="form-label">Email Subject</label>
        <input type="text" class="form-input" id="email-subject" placeholder="e.g. Welcome to the Workshop - Download Your Certificate">
      </div>
      <label class="form-label">Custom Email Message</label>
      <div id="editor-container" style="height: 150px; font-family: 'Inter', sans-serif; font-size: 14px;"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Assigned Teachers <span style="font-weight:400;font-size:12px;color:var(--gray-500);margin-left:8px;">* Note: 'Export CSV' only downloads currently visible rows based on your active filter.</span></div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Teacher</th>
          <th>Email</th>
          <th>Status</th>
          <th>Students</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="teachers-tbody">
        <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--gray-400)">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="toast-container"></div>

<!-- Quill.js Script -->
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script>
  'use strict';
  
  const API_BASE = 'https://gen-certificate-new.onrender.com';
  
  // Initialize Quill editor
  // Initialize Quill editor
  const quill = new Quill('#editor-container', {
    theme: 'snow',
    placeholder: "Type your custom email here. Use {name} for the teacher's name and {magiclink} to place the portal link.",
    modules: {
      toolbar: [
        ['bold', 'italic', 'underline'],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        ['link', 'image'],
        ['clean']
      ]
    }
  });

  async function logoutAdmin() {
    try {
      await fetch('/api/admin-logout', { method: 'POST' });
    } catch(e) {}
    window.location.href = '/login.html';
  }
  
  function toast(msg, type = 'info') {
    const icons = { success: 'check_circle', error: 'error' };
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<span class="material-symbols-outlined">${icons[type]}</span><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s || '');
    return d.innerHTML;
  }

  // Global State for Analytics & Filtering
  let globalTeachers = [];
  let kpiChartInstance = null;
  let currentFilter = 'all';

  // Parse eventId from URL
  const urlParams = new URLSearchParams(window.location.search);
  const eventId = urlParams.get('eventId');

  if (!eventId) {
    document.getElementById('event-subtitle').textContent = 'Error: No event ID provided.';
    document.getElementById('teachers-tbody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:red;">Event ID missing in URL.</td></tr>';
  } else {
    loadTeachers();
  }

  function toggleEmailChoice() {
    const choice = document.getElementById('email-choice').value;
    const msgGroup = document.getElementById('custom-msg-group');
    msgGroup.style.display = choice === 'custom' ? 'block' : 'none';
  }

  function filterTable(status, element = null) {
    currentFilter = status;
    if (element) {
      document.querySelectorAll('.kpi-card').forEach(c => c.classList.remove('active'));
      element.classList.add('active');
    }
    renderTable();
  }

  function updateKPIs() {
    const total = globalTeachers.length;
    const bouncedCount = globalTeachers.filter(t => t.email_bounced).length;
    const completedCount = globalTeachers.filter(t => t.status === 'used').length;
    // Pending are those who haven't completed and haven't bounced
    const pendingCount = globalTeachers.filter(t => t.status !== 'used' && !t.email_bounced).length;
    const conversion = total > 0 ? Math.round((completedCount / total) * 100) : 0;
    
    document.getElementById('kpi-total').textContent = total;
    document.getElementById('kpi-pending').textContent = pendingCount;
    document.getElementById('kpi-completed').textContent = `${completedCount}/${total}`;
    document.getElementById('kpi-bounced').textContent = bouncedCount;
    document.getElementById('kpi-conversion').textContent = `${conversion}%`;
    document.getElementById('chart-total').textContent = total;

    // Show analytics section only if we have teachers
    document.getElementById('analytics-section').style.display = total > 0 ? 'flex' : 'none';

    // Update Chart
    const ctx = document.getElementById('kpiChart');
    if (ctx && total > 0) {
        if (kpiChartInstance) {
            kpiChartInstance.data.datasets[0].data = [completedCount, pendingCount, bouncedCount];
            kpiChartInstance.update();
        } else {
            kpiChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'Pending', 'Bounced'],
                    datasets: [{
                        data: [completedCount, pendingCount, bouncedCount],
                        backgroundColor: ['#22C55E', '#E5E7EB', '#EF4444'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ' ' + context.label + ': ' + context.raw;
                                }
                            }
                        }
                    }
                }
            });
        }
    }

    // Bounce Alert Display
    let alertDiv = document.getElementById('bounce-alert');
    if (bouncedCount > 0) {
      if (!alertDiv) {
          alertDiv = document.createElement('div');
          alertDiv.id = 'bounce-alert';
          alertDiv.style.cssText = 'background:var(--red-light); color:#DC2626; padding:12px 16px; border-radius:var(--radius); border:1px solid #FCA5A5; margin-bottom:24px; font-weight:500; display:flex; align-items:center; gap:8px; font-size:14px;';
          document.getElementById('alert-anchor').appendChild(alertDiv);
      }
      alertDiv.innerHTML = `<span class="material-symbols-outlined">error</span> 🚨 ${bouncedCount} Teachers had bounced emails. Please verify their email addresses.`;
      alertDiv.style.display = 'flex';
    } else if (alertDiv) {
      alertDiv.style.display = 'none';
    }

    const unemailedCount = globalTeachers.filter(t => t.status !== 'used').length;
    document.getElementById('btn-email-pending').disabled = unemailedCount === 0;
  }

  function renderTable() {
    const tbody = document.getElementById('teachers-tbody');
    if (globalTeachers.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--gray-400)">No teachers assigned yet. Upload an Excel file.</td></tr>';
      return;
    }

    let filtered = globalTeachers;
    if (currentFilter === 'completed') {
        filtered = globalTeachers.filter(t => t.status === 'used');
    } else if (currentFilter === 'bounced') {
        filtered = globalTeachers.filter(t => t.email_bounced);
    } else if (currentFilter === 'pending') {
        filtered = globalTeachers.filter(t => t.status !== 'used' && !t.email_bounced);
    }

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--gray-400)">No teachers match this filter.</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(t => {
      const certCount = t.student_count || 0;
      let badge = t.status === 'used'
        ? `<span class="badge badge-green"><span class="material-symbols-outlined" style="font-size:12px">check_circle</span>Completed</span>`
        : '<span class="badge badge-gray">Pending</span>';
        
      if (t.email_bounced) {
        badge = `<span class="badge" title="${esc(t.bounce_error)}" style="background:var(--red-light); color:#DC2626; cursor:help;"><span class="material-symbols-outlined" style="font-size:12px">error</span>Bounced</span>`;
      }
        
      return `<tr>
        <td style="font-weight:600;">${esc(t.teacher_name)}</td>
        <td style="color:var(--gray-500)">${esc(t.teacher_email)}</td>
        <td>${badge}</td>
        <td style="color:var(--gray-500);font-weight:500">${certCount}</td>
        <td>
          <button class="btn btn-sm btn-outline text-red" onclick="deleteTeacher('${t.id}', this)" title="Delete Teacher" style="border-color:var(--red-light); color:var(--red); padding:4px 8px; margin:0;">
            <span class="material-symbols-outlined" style="font-size:16px;">delete</span>
          </button>
        </td>
      </tr>`;
    }).join('');
  }

  async function loadTeachers() {
    try {
      const res = await fetch(`${API_BASE}/api/admin/events/${eventId}/teachers`);
      if (!res.ok) throw new Error('Failed to load teachers');
      const data = await res.json();
      globalTeachers = data.teachers || [];
      
      document.getElementById('event-subtitle').textContent = `${globalTeachers.length} total teachers`;

      updateKPIs();
      renderTable();

    } catch (e) {
      document.getElementById('teachers-tbody').innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--red);padding:24px;">Error: ${esc(e.message)}</td></tr>`;
    }
  }

  async function handleExcelUpload(e) {
    const file = e.target.files[0];
    if (!file || !eventId) return;

    const btn = document.querySelector('label.btn-outline');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined spin">progress_activity</span>Uploading...';
    btn.style.pointerEvents = 'none';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch(`${API_BASE}/api/admin/events/${eventId}/teachers/upload`, {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (res.ok) {
        toast(`Successfully imported ${data.added} teachers!`, 'success');
        loadTeachers();
      } else {
        throw new Error(data.detail || 'Upload failed');
      }
    } catch (err) {
      toast(err.message, 'error');
    } finally {
      e.target.value = '';
      btn.innerHTML = originalText;
      btn.style.pointerEvents = 'auto';
    }
  }

  async function handleResendAll() {
    const choice = document.getElementById('email-choice').value;
    
    // Get HTML from Quill if custom is selected, otherwise empty string
    let msg = "";
    let subj = "";
    if (choice === 'custom') {
      msg = quill.root.innerHTML;
      subj = document.getElementById('email-subject').value.trim();
      
      // If editor is effectively empty, Quill still has "<p><br></p>"
      if (quill.getText().trim() === '') {
        toast('Please enter a custom message', 'error');
        return;
      }
      if (!subj) {
        toast('Please enter an email subject', 'error');
        return;
      }
    }

    if (!confirm('Are you sure you want to email all pending teachers?')) return;
    
    const btn = document.getElementById('btn-email-pending');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined spin">progress_activity</span>Sending...';

    try {
      const res = await fetch(API_BASE + '/api/admin/resend-event-links', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event_id: eventId, custom_message: msg, email_choice: choice, custom_subject: subj }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed to send emails');
      
      toast(data.message, 'success');
    } catch (err) {
      toast(err.message, 'error');
      btn.disabled = false;
    } finally {
      btn.innerHTML = '<span class="material-symbols-outlined">mail</span>Email Pending';
    }
  }

  async function deleteTeacher(teacherId, btn) {
    if (!confirm("Are you sure you want to remove this teacher?")) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined spin" style="font-size:16px;">progress_activity</span>';

    try {
      const res = await fetch(`${API_BASE}/api/admin/events/${eventId}/teacher/${teacherId}`, {
        method: 'DELETE'
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed to delete teacher');
      
      toast(data.message || "Teacher deleted successfully", 'success');
      
      // Remove from global array
      globalTeachers = globalTeachers.filter(t => t.id !== teacherId);
      
      // Remove from DOM immediately
      const tr = btn.closest('tr');
      if (tr) tr.remove();
      
      // Recalculate KPIs
      updateKPIs();
      
      if (globalTeachers.length === 0) renderTable();

    } catch (err) {
      toast(err.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">delete</span>';
    }
  }

  function exportCSV() {
    if (globalTeachers.length === 0) {
      toast('No data to export', 'error');
      return;
    }

    // Filter rows based on active KPI filter
    let filtered = globalTeachers;
    if (currentFilter === 'completed') {
        filtered = globalTeachers.filter(t => t.status === 'used');
    } else if (currentFilter === 'bounced') {
        filtered = globalTeachers.filter(t => t.email_bounced);
    } else if (currentFilter === 'pending') {
        filtered = globalTeachers.filter(t => t.status !== 'used' && !t.email_bounced);
    }

    if (filtered.length === 0) {
      toast('No matching rows to export', 'error');
      return;
    }

    // CSV Headers
    const headers = ['Teacher Name', 'Email', 'Status', 'Date'];
    
    // Robust escaping function for CSV
    const escapeCSV = (val) => {
        if (val === null || val === undefined) return '""';
        let str = String(val);
        str = str.replace(/"/g, '""'); // Double up quotes
        return `"${str}"`;
    };

    // Generate CSV Rows
    const rows = filtered.map(t => {
        let statusStr = t.status === 'used' ? 'Completed' : 'Pending';
        if (t.email_bounced) statusStr = 'Bounced';
        
        let dateStr = '';
        if (t.created_at) {
            dateStr = new Date(t.created_at).toLocaleDateString();
        }

        return [
            escapeCSV(t.teacher_name),
            escapeCSV(t.teacher_email),
            escapeCSV(statusStr),
            escapeCSV(dateStr)
        ].join(',');
    });

    const csvContent = [headers.join(','), ...rows].join('\n');
    
    // Create Blob & Force Download via hidden <a>
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", `teachers_data_${currentFilter}.csv`);
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    
    toast(`Exported ${filtered.length} rows to CSV`, 'success');
  }
</script>
</body>
</html>
